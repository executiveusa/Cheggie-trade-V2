version: "3.9"

services:
  api:
    build:
      context: services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - HERMES_URL=http://hermes:8001
      - API_PORT=8000
    depends_on:
      - hermes

  hermes:
    build:
      context: .
      dockerfile: services/hermes/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_PORT=8001

  browser-agent:
    build:
      context: services/browser-agent
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - BROWSER_PORT=8002

  voice:
    build:
      context: services/voice
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - HERMES_URL=http://hermes:8001
      - VOICE_PORT=8003

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
